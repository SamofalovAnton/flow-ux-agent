<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #fff; color: #1A1A1A; padding: 16px; width: 296px; }

    h1 { font-size: 16px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.3px; }
    .sub { font-size: 11px; color: #888; margin-bottom: 14px; }

    .type-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-bottom: 10px; }
    .type-brief { background: #F0FFF4; color: #276749; }
    .type-competitors { background: #EBF4FF; color: #1A56A4; }

    .preview { background: #FAFAFA; border: 1px solid #E5E5E5; border-radius: 8px; padding: 12px; margin-bottom: 14px; min-height: 60px; max-height: 220px; overflow-y: auto; display: none; }
    .preview.visible { display: block; }
    .group { margin-bottom: 10px; }
    .group-title { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .field { margin-bottom: 3px; }
    .field-label { font-size: 10px; color: #999; }
    .field-value { font-size: 11px; color: #1A1A1A; line-height: 1.4; }
    .field-empty { font-size: 11px; color: #DDD; font-style: italic; }
    .project-name { font-size: 13px; font-weight: 600; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #E5E5E5; }
    .competitor-tab { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #1A1A1A; color: #fff; font-size: 10px; font-weight: 600; margin-bottom: 8px; margin-right: 4px; }
    .conclusion-block { background: #FFFBEB; border: 1px solid #FBD38D; border-radius: 6px; padding: 8px; margin-top: 8px; }
    .conclusion-title { font-size: 10px; font-weight: 700; color: #744210; margin-bottom: 4px; }

    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: opacity 0.1s; }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #1A1A1A; color: #fff; }
    .btn-secondary { background: #F5F5F5; color: #1A1A1A; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .status { font-size: 11px; text-align: center; color: #888; margin-top: 4px; min-height: 16px; }
    .status.error { color: #E53E3E; }
    .status.success { color: #22C55E; }

    .hint { font-size: 11px; color: #AAA; line-height: 1.5; text-align: center; padding: 12px 0; }

    .paste-area { width: 100%; height: 72px; border: 1.5px dashed #DDD; border-radius: 8px; padding: 8px; font-size: 11px; color: #1A1A1A; resize: none; outline: none; margin-bottom: 8px; background: #FAFAFA; }
    .paste-area:focus { border-color: #1A1A1A; background: #fff; }

    .auto-badge { display: flex; align-items: center; gap: 6px; background: #F0FFF4; border: 1px solid #9AE6B4; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #276749; font-weight: 600; }
    .scanning { display: flex; align-items: center; gap: 6px; background: #EBF4FF; border: 1px solid #BEE3F8; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #1A56A4; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Brief Importer</h1>
  <p class="sub">Auto-import з FLOW застосунку</p>

  <div id="scanning" class="scanning" style="display:none;">⏳ Зчитую дані з буфера...</div>
  <div id="autoBadge" class="auto-badge" style="display:none;">✓ Дані знайдено автоматично!</div>

  <div id="preview" class="preview"></div>
  <div id="hint" class="hint">Натисни <strong>⚡ Sync</strong> у FLOW,<br>потім відкрий цей плагін — дані підтягнуться автоматично</div>

  <div id="manualSection" style="display:none;">
    <textarea id="pasteArea" class="paste-area" placeholder="Або встав JSON сюди вручну (⌘V)…"></textarea>
    <button class="btn btn-secondary" id="pasteBtn" onclick="parseManual()">📋 Зчитати вручну</button>
  </div>

  <button class="btn btn-primary" id="importBtn" onclick="importToFigma()" disabled>✦ Create in Figma</button>
  <button class="btn btn-secondary" id="manualBtn" onclick="toggleManual()" style="font-size:11px; padding:7px; margin-bottom:4px;">вставити вручну</button>
  <div class="status" id="status"></div>

  <script>
    let parsedData = null;

    // ─── Auto-read clipboard on open ─────────────────────────────────────────
    window.addEventListener('load', () => {
      autoReadClipboard();
    });

    async function autoReadClipboard() {
      const scanEl = document.getElementById('scanning');
      scanEl.style.display = 'flex';
      try {
        const text = await navigator.clipboard.readText();
        scanEl.style.display = 'none';
        if (!text || !text.trim()) { showHint(); return; }
        const parsed = JSON.parse(text.trim());
        if (parsed.type !== 'flow_brief' && parsed.type !== 'flow_competitors') { showHint(); return; }

        // Got valid FLOW data!
        parsedData = parsed;
        renderPreview(parsed);
        document.getElementById('importBtn').disabled = false;
        document.getElementById('hint').style.display = 'none';
        document.getElementById('autoBadge').style.display = 'flex';
        const label = parsed.type === 'flow_brief' ? '📋 Бриф' : '🔍 Конкуренти';
        setStatus('\u2713 ' + label + ': ' + parsed.projectName, 'success');

        // Auto-import after short delay
        setTimeout(() => importToFigma(), 800);

      } catch (e) {
        scanEl.style.display = 'none';
        // clipboard read might fail due to permissions — show manual fallback
        showHint();
      }
    }

    function showHint() {
      document.getElementById('hint').style.display = 'block';
    }

    function toggleManual() {
      const ms = document.getElementById('manualSection');
      ms.style.display = ms.style.display === 'none' ? 'block' : 'none';
    }

    function parseManual() {
      const statusEl = document.getElementById('status');
      try {
        const text = document.getElementById('pasteArea').value.trim();
        if (!text) { setStatus('⚠ Встав JSON у поле вище', 'error'); return; }
        const parsed = JSON.parse(text);
        if (parsed.type !== 'flow_brief' && parsed.type !== 'flow_competitors') {
          setStatus('⚠ Не є FLOW даними', 'error'); return;
        }
        parsedData = parsed;
        renderPreview(parsed);
        document.getElementById('importBtn').disabled = false;
        document.getElementById('hint').style.display = 'none';
        document.getElementById('manualSection').style.display = 'none';
        document.getElementById('manualBtn').style.display = 'none';
        const label = parsed.type === 'flow_brief' ? '📋 Бриф' : '🔍 Конкуренти';
        setStatus('\u2713 ' + label + ': ' + parsed.projectName, 'success');
      } catch (e) {
        setStatus('⚠ Некоректний JSON формат', 'error');
      }
    }

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }

    function renderPreview(data) {
      const el = document.getElementById('preview');
      let html = '<div class="project-name">\uD83D\uDCC1 ' + data.projectName + '</div>';

      if (data.type === 'flow_brief') {
        const brief  = data.brief || {};
        const GROUPS = [
          { id: 'client',      title: 'Про клієнта', emoji: '\uD83D\uDC64', fields: [{ id:'who', label:'Клієнт' }, { id:'usp', label:'УТП' }, { id:'advantages', label:'Переваги' }, { id:'disadvantages', label:'Недоліки' }] },
          { id: 'goal',        title: 'Мета',         emoji: '\uD83C\uDFAF', fields: [{ id:'keyAction', label:'Ключова дія' }, { id:'purpose', label:'Навіщо' }] },
          { id: 'wishes',      title: 'Побажання',    emoji: '\u2728',       fields: [{ id:'ui', label:'UI' }, { id:'structure', label:'Структура' }, { id:'limitations', label:'Обмеження' }] },
          { id: 'competition', title: 'Конкуренція',  emoji: '\uD83D\uDD0D', fields: [{ id:'competitors', label:'Конкуренти' }] },
          { id: 'additional',  title: 'Додатково',    emoji: '\uD83D\uDCCE', fields: [{ id:'materials', label:'Матеріали' }, { id:'questions', label:'Питання' }] },
        ];
        html += '<span class="type-badge type-brief">\uD83D\uDCCB Бриф</span>';
        GROUPS.forEach(function(g) {
          var gData = brief[g.id] || {};
          html += '<div class="group"><div class="group-title">' + g.emoji + ' ' + g.title + '</div>';
          g.fields.forEach(function(f) {
            var val = gData[f.id] ? gData[f.id].toString().trim() : '';
            html += '<div class="field"><span class="field-label">' + f.label + ': </span>';
            html += val ? '<span class="field-value">' + val.slice(0, 70) + (val.length > 70 ? '\u2026' : '') + '</span>' : '<span class="field-empty">\u2014</span>';
            html += '</div>';
          });
          html += '</div>';
        });

      } else if (data.type === 'flow_competitors') {
        var list = data.competitors || [];
        html += '<span class="type-badge type-competitors">\uD83D\uDD0D Конкуренти (' + list.length + ')</span>';
        list.forEach(function(comp, idx) {
          html += '<div class="group">';
          html += '<div class="competitor-tab">' + (comp.name || ('Конкурент ' + (idx+1))) + '</div>';
          var c = comp.conclusion || {};
          if (c.works_well)   html += '<div class="field"><span class="field-label">\u2705 Добре: </span><span class="field-value">' + c.works_well.slice(0,60) + '\u2026</span></div>';
          if (c.works_poorly) html += '<div class="field"><span class="field-label">\u274C Погано: </span><span class="field-value">' + c.works_poorly.slice(0,60) + '\u2026</span></div>';
          if (c.to_remember)  html += '<div class="field"><span class="field-label">\uD83D\uDCCC Запам\'ятати: </span><span class="field-value">' + c.to_remember.slice(0,60) + '\u2026</span></div>';
          html += '</div>';
        });
      }

      el.innerHTML = html;
      el.classList.add('visible');
    }

    function importToFigma() {
      if (!parsedData) return;
      setStatus('\u23F3 Створюємо в Figma...', '');
      document.getElementById('importBtn').disabled = true;
      document.getElementById('autoBadge').style.display = 'none';
      var msgType = parsedData.type === 'flow_brief' ? 'CREATE_BRIEF' : 'CREATE_COMPETITORS';
      parent.postMessage({ pluginMessage: { type: msgType, data: parsedData } }, '*');
    }

    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'DONE') {
        setStatus('\u2713 Створено в Figma!', 'success');
        document.getElementById('importBtn').disabled = false;
      } else if (msg.type === 'ERROR') {
        setStatus('\u2717 ' + msg.message, 'error');
        document.getElementById('importBtn').disabled = false;
      }
    };
  </script>
</body>
</html>
