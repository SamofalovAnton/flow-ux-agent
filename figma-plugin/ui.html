<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #fff; color: #1A1A1A;
      width: 280px; height: 420px;
      display: flex; flex-direction: column;
      user-select: none;
    }

    /* ── Header ── */
    .header { padding: 14px 16px 10px; border-bottom: 1px solid #F0F0F0; }
    .header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
    .header p  { font-size: 10px; color: #999; margin-top: 1px; }

    /* ── Screens ── */
    .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px 16px; text-align: center; }
    .screen.active { display: flex; }

    /* WAITING screen */
    .paste-icon { font-size: 40px; margin-bottom: 16px; }
    .paste-hint { font-size: 13px; font-weight: 600; color: #1A1A1A; margin-bottom: 6px; }
    .paste-sub  { font-size: 11px; color: #999; line-height: 1.5; }
    .kbd { display: inline-block; background: #F5F5F5; border: 1px solid #DDD; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 600; color: #333; }

    /* PREVIEW screen */
    .preview-header { width: 100%; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .preview-badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; }
    .badge-brief { background: #F0FFF4; color: #276749; }
    .badge-comp  { background: #EBF4FF; color: #1A56A4; }
    .preview-name { font-size: 12px; font-weight: 600; flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-body { width: 100%; flex: 1; overflow-y: auto; text-align: left; background: #FAFAFA; border: 1px solid #EBEBEB; border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 11px; color: #444; line-height: 1.6; }
    .field-row { display: flex; gap: 4px; margin-bottom: 2px; }
    .field-key { color: #AAA; min-width: 70px; }
    .field-val { color: #1A1A1A; }
    .field-empty { color: #DDD; font-style: italic; }
    .comp-name  { font-weight: 700; font-size: 11px; margin-top: 6px; margin-bottom: 2px; color: #1A1A1A; }

    /* IMPORTING screen */
    .spin { font-size: 32px; animation: spin 1s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .importing-text { font-size: 13px; font-weight: 600; }
    .importing-sub  { font-size: 11px; color: #999; margin-top: 4px; }

    /* DONE screen */
    .done-icon  { font-size: 40px; margin-bottom: 14px; }
    .done-text  { font-size: 13px; font-weight: 700; color: #22C55E; margin-bottom: 4px; }
    .done-sub   { font-size: 11px; color: #999; }

    /* ERROR screen */
    .error-icon { font-size: 32px; margin-bottom: 12px; }
    .error-text { font-size: 13px; font-weight: 600; color: #E53E3E; margin-bottom: 6px; }
    .error-sub  { font-size: 11px; color: #999; line-height: 1.5; }

    /* ── Buttons ── */
    .footer { padding: 12px 16px; border-top: 1px solid #F0F0F0; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 9px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-dark   { background: #1A1A1A; color: #fff; }
    .btn-light  { background: #F5F5F5; color: #1A1A1A; }
    .btn-green  { background: #22C55E; color: #fff; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .footer.hidden { display: none; }
  </style>
</head>
<body>

  <!-- SCREEN 1: Waiting for paste -->
  <div class="header">
    <h1>Brief Importer</h1>
    <p>FLOW → Figma автоімпорт</p>
  </div>

  <div id="screen-wait" class="screen active">
    <div class="paste-icon">📋</div>
    <div class="paste-hint">Натисни <span class="kbd">⌘V</span> щоб імпортувати</div>
    <div class="paste-sub">
      Спочатку натисни <strong>⚡ Sync</strong> у FLOW<br>
      щоб скопіювати бриф у буфер,<br>
      потім натисни <span class="kbd">⌘V</span> тут
    </div>
  </div>

  <!-- SCREEN 2: Preview -->
  <div id="screen-preview" class="screen" style="align-items:flex-start; justify-content:flex-start; padding-top:14px;">
    <div class="preview-header">
      <div id="previewBadge" class="preview-badge badge-brief">📋 Бриф</div>
      <div id="previewName" class="preview-name">—</div>
    </div>
    <div id="previewBody" class="preview-body"></div>
  </div>

  <!-- SCREEN 3: Importing -->
  <div id="screen-import" class="screen">
    <div class="spin">⚙️</div>
    <div class="importing-text">Створюємо у Figma…</div>
    <div class="importing-sub">Будь ласка, зачекайте</div>
  </div>

  <!-- SCREEN 4: Done -->
  <div id="screen-done" class="screen">
    <div class="done-icon">✅</div>
    <div class="done-text">Готово!</div>
    <div class="done-sub">Документ створено у Figma</div>
  </div>

  <!-- SCREEN 5: Error -->
  <div id="screen-error" class="screen">
    <div class="error-icon">⚠️</div>
    <div id="errorText" class="error-text">Помилка</div>
    <div id="errorSub"  class="error-sub">—</div>
  </div>

  <!-- Footer buttons -->
  <div id="footer" class="footer hidden">
    <button id="btnCreate" class="btn btn-dark" onclick="runImport()">✦ Create in Figma</button>
    <button id="btnReset"  class="btn btn-light" onclick="resetPlugin()">↺</button>
  </div>

  <script>
    var parsedData = null;

    /* ── Show screen ── */
    function show(name) {
      ['wait','preview','import','done','error'].forEach(function(s) {
        document.getElementById('screen-' + s).classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
      var footer = document.getElementById('footer');
      footer.className = 'footer' + (name === 'preview' ? '' : ' hidden');
    }

    /* ── Global paste listener ── */
    document.addEventListener('paste', function(e) {
      var raw = (e.clipboardData || window.clipboardData).getData('text');
      if (!raw || !raw.trim()) return;
      handleData(raw.trim());
    });

    /* ── Also catch keydown Cmd/Ctrl+V if paste event doesn't fire ── */
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'v') {
        // paste event should fire automatically; this is a fallback trigger notice
      }
    });

    function handleData(raw) {
      try {
        var parsed = JSON.parse(raw);
        if (parsed.type !== 'flow_brief' && parsed.type !== 'flow_competitors') {
          showError('Не FLOW дані', 'Скопіюй бриф через кнопку ⚡ Sync у FLOW застосунку');
          return;
        }
        parsedData = parsed;
        renderPreview(parsed);
        show('preview');

        // Auto-run import after short delay
        setTimeout(function() { runImport(); }, 600);

      } catch(err) {
        showError('Некоректний формат', 'Переконайся що натиснув ⚡ Sync перед копіюванням');
      }
    }

    function renderPreview(data) {
      var badge = document.getElementById('previewBadge');
      var name  = document.getElementById('previewName');
      var body  = document.getElementById('previewBody');

      name.textContent = data.projectName || '—';

      if (data.type === 'flow_brief') {
        badge.textContent = '📋 Бриф';
        badge.className = 'preview-badge badge-brief';
        var brief = data.brief || {};
        var html = '';
        var sections = [
          { id:'client',      label:'👤 Клієнт',     fields:['who','usp','advantages','disadvantages'] },
          { id:'goal',        label:'🎯 Мета',        fields:['keyAction','purpose'] },
          { id:'wishes',      label:'✨ Побажання',   fields:['ui','structure','limitations'] },
          { id:'competition', label:'🔍 Конкуренція', fields:['competitors'] },
          { id:'additional',  label:'📎 Додатково',   fields:['materials','questions'] },
        ];
        sections.forEach(function(sec) {
          var d = brief[sec.id] || {};
          var hasVal = sec.fields.some(function(f){ return d[f] && d[f].trim(); });
          if (!hasVal) return;
          html += '<div style="font-size:10px;font-weight:700;color:#555;text-transform:uppercase;margin-top:8px;margin-bottom:3px">' + sec.label + '</div>';
          sec.fields.forEach(function(f) {
            var v = d[f] ? d[f].trim() : '';
            if (!v) return;
            html += '<div class="field-row"><span class="field-key">' + f + '</span><span class="field-val">' + v.slice(0,50) + (v.length>50?'…':'') + '</span></div>';
          });
        });
        body.innerHTML = html || '<span style="color:#CCC">Дані відсутні</span>';

      } else if (data.type === 'flow_competitors') {
        badge.textContent = '🔍 Конкуренти (' + (data.competitors||[]).length + ')';
        badge.className = 'preview-badge badge-comp';
        var html = '';
        (data.competitors || []).forEach(function(c) {
          html += '<div class="comp-name">🏢 ' + (c.name || '—') + '</div>';
          var conc = c.conclusion || {};
          if (conc.works_well)   html += '<div class="field-row"><span class="field-key" style="color:#22C55E">✅ добре</span><span class="field-val">' + conc.works_well.slice(0,45) + '…</span></div>';
          if (conc.works_poorly) html += '<div class="field-row"><span class="field-key" style="color:#E53E3E">❌ погано</span><span class="field-val">' + conc.works_poorly.slice(0,45) + '…</span></div>';
        });
        body.innerHTML = html || '<span style="color:#CCC">Немає даних</span>';
      }
    }

    function runImport() {
      if (!parsedData) return;
      show('import');
      var msgType = parsedData.type === 'flow_brief' ? 'CREATE_BRIEF' : 'CREATE_COMPETITORS';
      parent.postMessage({ pluginMessage: { type: msgType, data: parsedData } }, '*');
    }

    function resetPlugin() {
      parsedData = null;
      show('wait');
    }

    function showError(title, sub) {
      document.getElementById('errorText').textContent = title;
      document.getElementById('errorSub').textContent  = sub;
      show('error');
      setTimeout(function() { show('wait'); }, 3000);
    }

    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'DONE') {
        show('done');
      } else if (msg.type === 'ERROR') {
        showError('Помилка Figma', msg.message || 'Спробуй ще раз');
      }
    };
  </script>
</body>
</html>
